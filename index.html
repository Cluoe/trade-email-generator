<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>外贸客户画像开发助手</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="input-panel" aria-labelledby="pageTitle">
          <div class="brand-row">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>Customer Profile Outreach</span>
          </div>

          <header class="page-header">
            <p class="eyebrow">外贸业务员专用</p>
            <h1 id="pageTitle">外贸客户画像开发助手</h1>
            <p class="intro">根据产品定位、报价、MOQ 和优势，自动生成适合开发的客户类型与英文开发话术。</p>
          </header>

          <form id="profileForm" class="profile-form">
            <div class="field-grid">
              <label>
                <span>目标国家</span>
                <input id="country" type="text" placeholder="例如：United States" required />
              </label>

              <label>
                <span>产品名称</span>
                <input id="product" type="text" placeholder="例如：solar garden lights" required />
              </label>
            </div>

            <label>
              <span>产品定位</span>
              <select id="positioning" required>
                <option value="low">低端</option>
                <option value="mid" selected>中端</option>
                <option value="midHigh">中高端</option>
                <option value="high">高端</option>
              </select>
            </label>

            <div class="field-grid">
              <label>
                <span>报价信息</span>
                <input id="priceInfo" type="text" placeholder="例如：FOB $3.8-4.5 / pcs" required />
              </label>

              <label>
                <span>MOQ</span>
                <input id="moq" type="text" placeholder="例如：500 pcs" required />
              </label>
            </div>

            <label>
              <span>主要产品优势</span>
              <textarea
                id="advantages"
                rows="4"
                placeholder="例如：防水等级高、太阳能转换效率高、支持OEM包装、交期快、质检严格"
                required
              ></textarea>
            </label>

            <label>
              <span>是否需要自动推荐客户类型</span>
              <select id="autoRecommend" required>
                <option value="yes" selected>是</option>
                <option value="no">否</option>
              </select>
            </label>

            <button class="generate-button" type="submit">
              <span class="plus-icon" aria-hidden="true"></span>
              生成客户画像和开发话术
            </button>
          </form>
        </aside>

        <section class="output-panel" aria-label="生成结果">
          <div class="output-header">
            <div>
              <p class="eyebrow">Generated Profiles</p>
              <h2>客户画像与英文开发内容</h2>
            </div>
            <div class="output-actions">
              <button id="copyAllButton" class="copy-button" type="button" disabled>
                <span class="copy-icon" aria-hidden="true"></span>
                全部复制
              </button>
              <p id="statusMessage" class="status-message" role="status"></p>
            </div>
          </div>

          <div id="summaryPanel" class="summary-panel">
            填写左侧信息后，将自动生成 5 类适合开发的目标客户，以及每类客户的英文开发信、WhatsApp 首条消息和 Follow-up 邮件。
          </div>

          <div id="profileResults" class="profile-results" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
